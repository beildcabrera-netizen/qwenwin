version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: academia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: academia_user
      POSTGRES_PASSWORD: AcademiaPass2024!
      POSTGRES_DB: academia_db
      TZ: America/La_Paz
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - academia_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academia_user -d academia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: academia_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - academia_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  academia_network:
    driver: bridge
