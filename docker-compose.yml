version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: academia_postgres
    environment:
      POSTGRES_USER: academia
      POSTGRES_PASSWORD: academia123
      POSTGRES_DB: academia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - academia_network

  redis:
    image: redis:7-alpine
    container_name: academia_redis
    ports:
      - "6379:6379"
    networks:
      - academia_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: academia_backend
    environment:
      DATABASE_URL: postgresql://academia:academia123@postgres:5432/academia_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: tu_secreto_muy_seguro_cambialo_en_produccion
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - academia_network
    command: sh -c "npx prisma migrate deploy && npm run start:prod"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: academia_frontend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - academia_network

volumes:
  postgres_data:

networks:
  academia_network:
    driver: bridge
